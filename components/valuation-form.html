<!-- VALUATION FORM COMPONENT -->
<section id="valuation" class="py-24 md:py-32 bg-[#FAF8F5] text-[#18191B] border-t border-neutral-200/60">
  <div class="max-w-4xl mx-auto px-6">
    <!-- Header -->
    <div class="text-center max-w-2xl mx-auto mb-16 md:mb-20 flex flex-col gap-4">
      <span class="text-[10px] tracking-[0.4em] text-[#C5A880] uppercase font-semibold">Private Advisory</span>
      <h2 class="font-display text-3xl md:text-4xl font-light tracking-tight capitalize leading-tight">
        Acquire a Curated Property Valuation
      </h2>
      <p class="text-xs md:text-sm text-[#4A4C50] leading-relaxed">
        Establish the off-market value of your architectural residence. Submit your estate profiles to receive an analytical dossier prepared by our Malibu underwriting desk.
      </p>
    </div>

    <!-- Form -->
    <form class="flex flex-col gap-10 md:gap-12" id="broker-valuation-form">
      <!-- Input Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Full Name -->
        <div class="relative border-b border-neutral-300 pb-2 group">
          <label for="val-name" class="block text-[9px] tracking-widest text-[#4A4C50] uppercase mb-1 font-semibold">Owner's Full Name</label>
          <input type="text" id="val-name" placeholder="E.g., Julian Vance" class="w-full bg-transparent text-sm text-[#18191B] placeholder-neutral-400/80 outline-none py-1 focus:placeholder-transparent" required>
          <div class="absolute bottom-[-1px] left-0 w-0 h-[1px] bg-[#C5A880] transition-all duration-300 group-focus-within:w-full"></div>
        </div>

        <!-- Contact Email -->
        <div class="relative border-b border-neutral-300 pb-2 group">
          <label for="val-email" class="block text-[9px] tracking-widest text-[#4A4C50] uppercase mb-1 font-semibold">Direct Email Address</label>
          <input type="email" id="val-email" placeholder="E.g., julian@vanceatelier.com" class="w-full bg-transparent text-sm text-[#18191B] placeholder-neutral-400/80 outline-none py-1 focus:placeholder-transparent" required>
          <div class="absolute bottom-[-1px] left-0 w-0 h-[1px] bg-[#C5A880] transition-all duration-300 group-focus-within:w-full"></div>
        </div>

        <!-- Property Location -->
        <div class="relative border-b border-neutral-300 pb-2 group md:col-span-2">
          <label for="val-location" class="block text-[9px] tracking-widest text-[#4A4C50] uppercase mb-1 font-semibold">Property Address & Neighborhood context</label>
          <input type="text" id="val-location" placeholder="E.g., 23400 Pacific Coast Highway, Malibu" class="w-full bg-transparent text-sm text-[#18191B] placeholder-neutral-400/80 outline-none py-1 focus:placeholder-transparent" required>
          <div class="absolute bottom-[-1px] left-0 w-0 h-[1px] bg-[#C5A880] transition-all duration-300 group-focus-within:w-full"></div>
        </div>
      </div>

      <!-- Interactive Ranges Sliders -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-4">
        <!-- Range 1: Est Square Footage -->
        <div class="flex flex-col gap-4">
          <div class="flex justify-between items-center text-[10px] tracking-wider uppercase font-semibold">
            <span class="text-[#4A4C50]">Estimated Living Area</span>
            <span class="text-[#C5A880] font-mono" id="slider-size-val">3,500 SQ. FT.</span>
          </div>
          <input type="range" id="slider-size" min="1000" max="15000" step="250" value="3500" class="w-full accent-[#C5A880] bg-neutral-200 cursor-pointer h-1 rounded-lg">
        </div>

        <!-- Range 2: Est Bedrooms -->
        <div class="flex flex-col gap-4">
          <div class="flex justify-between items-center text-[10px] tracking-wider uppercase font-semibold">
            <span class="text-[#4A4C50]">Approximate Bed Suites</span>
            <span class="text-[#C5A880] font-mono" id="slider-beds-val">4 Suites</span>
          </div>
          <input type="range" id="slider-beds" min="1" max="12" step="1" value="4" class="w-full accent-[#C5A880] bg-neutral-200 cursor-pointer h-1 rounded-lg">
        </div>
      </div>

      <!-- Submission button -->
      <div class="flex justify-center mt-6">
        <button type="submit" class="group relative px-12 py-4 bg-[#18191B] overflow-hidden transition-all duration-500 hover:bg-[#C5A880]">
          <span class="relative z-10 text-[10px] tracking-[0.25em] uppercase text-white font-bold">
            Submit Valuation Inquiry
          </span>
        </button>
      </div>
    </form>
  </div>
</section>

<script>
  // Script to update sliders feedback values dynamically
  document.addEventListener("DOMContentLoaded", () => {
    const sizeSlider = document.getElementById("slider-size");
    const sizeVal = document.getElementById("slider-size-val");
    const bedsSlider = document.getElementById("slider-beds");
    const bedsVal = document.getElementById("slider-beds-val");

    if (sizeSlider && sizeVal) {
      sizeSlider.addEventListener("input", (e) => {
        const value = parseInt(e.target.value).toLocaleString();
        sizeVal.textContent = `${value} SQ. FT.`;
      });
    }

    if (bedsSlider && bedsVal) {
      bedsSlider.addEventListener("input", (e) => {
        const value = e.target.value;
        bedsVal.textContent = `${value} ${value === '1' ? 'Suite' : 'Suites'}`;
      });
    }

    // Handle Form Submit Event
    const form = document.getElementById("broker-valuation-form");
    if (form) {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Thank you. Your dossier request has been submitted to the Apex desk.");
      });
    }
  });
</script>
